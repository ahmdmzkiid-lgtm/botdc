services:
  bot:
    build:
      context: .
      dockerfile: apps/bot/Dockerfile
    ports:
      - "3001:3001"
    env_file:
      - .env
    environment:
      - NODE_ENV=production

  dashboard:
    build:
      context: .
      dockerfile: apps/dashboard/Dockerfile
    ports:
      - "80:80"
    depends_on:
      - bot
